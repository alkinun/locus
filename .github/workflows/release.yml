name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Check
        run: cargo check --locked

  build:
    name: build ${{ matrix.target }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-15
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build with cross
        if: matrix.use_cross
        run: cross build --locked --release --target ${{ matrix.target }}
      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          name="locus-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/locus" "dist/${name}/locus"
          tar -C "dist/${name}" -czf "dist/${name}.tar.gz" locus
          if command -v shasum >/dev/null 2>&1; then
            (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          else
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: locus-${{ matrix.target }}
          path: |
            dist/locus-${{ matrix.target }}.tar.gz
            dist/locus-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            gh release create "$TAG" "${files[@]}" --verify-tag --title "$TAG" --generate-notes
          fi
